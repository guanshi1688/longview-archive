site_name: Longview Archive｜观势档案
site_description: Public text archive for long-view essays, observation notes, and theoretical terms.
site_author: 星衡｜Aster Vale
site_url: https://longview-archive.org

theme:
  name: material
  language: zh
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.path
    - navigation.top
    - search.highlight
  palette:
    - scheme: default
      primary: blue grey
      accent: blue

nav:
  - Home｜首页: index.md

  - Core Terms｜理论核心术语: core-terms.md

  - Longview Essays｜长线观势:
      - essays/index.md

      - Reality｜现实世界:
          - 01｜现实世界总纲: essays/reality/01.md
          - 02｜人为假顶: essays/reality/02.md
          - 03｜变现封锁双线策略: essays/reality/03.md

      - Future Path｜未来之路: essays/future/index.md

  - Aster Vale Notes｜星衡札记: notes/index.md

  - Version Records｜版本记录: versions.md

extra_css:
  - stylesheets/extra.css
