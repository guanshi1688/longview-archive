site_name: Longview Archive｜观势档案
site_description: Public text archive for long-view essays, observation notes, and theoretical terms.
site_author: 星衡｜Aster Vale

theme:
  name: material
  language: zh
  features:
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - search.highlight
  palette:
    - scheme: default
      primary: blue grey
      accent: blue

