site_name: Longview Archive｜观势档案
site_description: Public text archive for long-view essays, observation notes, and theoretical terms.
site_author: 星衡｜Aster Vale
site_url: https://longview-archive.org

theme:
  name: material
  language: zh
  features:
    - navigation.sections
    - navigation.path
    - navigation.top
    - search.highlight
  palette:
    - scheme: default
      primary: blue grey
      accent: blue

nav:
  - Index｜索引: index.md

  - Core Terms｜理论核心术语: core-terms.md

  - Longview Essays｜长线观势:
      - Overview｜总览: essays/index.md

      - Reality｜现实世界:
          - 阅读前约束: essays/reality/00.md
          - 01｜人类文明的三种底层模式: essays/reality/01.md
          - 02｜中国制度与做功机器: essays/reality/02.md
          - 03｜全球南方不是第二个中国: essays/reality/03.md
          - 04｜中国不能把自己的生存方式当作世界答案: essays/reality/04.md
          - 05｜成熟市场为什么不愿承接中国工业 2.0: essays/reality/05.md
          - 06｜不限制生产，只约束变现: essays/reality/06.md
          - 07｜热战不是最优解: essays/reality/07.md
          - 08｜中国出海进入秩序闭环阶段: essays/reality/08.md
          - 阅读后约束: essays/reality/11.md

      - Future Path｜未来之路:
          - Overview｜整理中: essays/future/index.md

  - Aster Vale Notes｜星衡札记: notes/index.md

  - Version Records｜版本记录: versions.md

extra_css:
  - stylesheets/extra.css
