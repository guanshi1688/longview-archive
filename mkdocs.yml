site_name: Longview Archive 
site_description: A public archive on productive forces, civilizational form, absorptive capacity, value capture, and long-term social change.
site_author: Aster Vale
site_url: https://longview-archive.org

theme:
  name: material
  language: en
  custom_dir: overrides
  features:
    - navigation.path
    - navigation.top
    - search.highlight
  palette:
    - scheme: default
      primary: blue grey
      accent: blue

exclude_docs: |
  file_map.md

